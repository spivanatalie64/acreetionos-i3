# SYSLINUX boot config for AcreetionOS i3
UI menu.c32
PROMPT 0
MENU TITLE AcreetionOS i3
TIMEOUT 300

DEFAULT boot

LABEL boot
  MENU LABEL Boot AcreetionOS i3
  LINUX /arch/boot/x86_64/vmlinuz-linux
  INITRD /arch/boot/x86_64/initramfs-linux.img
  APPEND archisobasedir=arch archisodevice=/dev/disk/by-label/ACREETIONOS

LABEL boot-nofallback
  MENU LABEL Boot AcreetionOS i3 (no fallback)
  LINUX /arch/boot/x86_64/vmlinuz-linux
  INITRD /arch/boot/x86_64/initramfs-linux.img
  APPEND archisobasedir=arch archisodevice=/dev/disk/by-label/ACREETIONOS

LABEL hdd
  MENU LABEL Boot from existing OS
  COM32 chain.c32
  APPEND hd0

LABEL poweroff
  MENU LABEL Power off
  COM32 poweroff.c32

LABEL reboot
  MENU LABEL Reboot
  COM32 reboot.c32
